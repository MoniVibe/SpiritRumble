name: Deploy Flutter Web To GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Configure Git auth for private dependencies
        if: ${{ secrets.PUREFLUTTER_READ_TOKEN != '' }}
        run: |
          git config --global url."https://x-access-token:${{ secrets.PUREFLUTTER_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Verify dependency access
        run: |
          if ! git ls-remote https://github.com/gammula/pureflutter.git > /dev/null; then
            echo "::error::Cannot access https://github.com/gammula/pureflutter.git. Add Actions secret PUREFLUTTER_READ_TOKEN with read access to that repository."
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
